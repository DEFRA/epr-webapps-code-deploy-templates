parameters:
  - name: solutionFolder
    type: string
    default: ''
  - name: projectFolder
    type: string
    default: ''
  - name: dependencyDataContainer
    type: string
    default: ''
  - name: dependencyDataStorageAccount
    type: string
    default: ''

steps:
  - script: |
      echo 'Working Folder: $(System.DefaultWorkingDirectory)'
      echo 'Solution Folder: ${{parameters.solutionFolder}}'
      echo 'Project Folder: ${{parameters.projectFolder}}'
      echo 'Dependency Data Container: ${{parameters.dependencyDataContainer}}'
      echo 'Dependency Data Storage Account: ${{parameters.dependencyDataStorageAccount}}'
    displayName: Debug Input Parameters
        
  - task: DockerInstaller@0
    displayName: 'Docker Installer'
    inputs:
      dockerVersion: 17.09.0-ce
      releaseType: stable
      
  - task: AzureKeyVault@2
    displayName: 'Get OWASP NVD Key'
    inputs:
      azureSubscription: 'AZD-RWD-DEV1'
      KeyVaultName: 'DEVRWDINFKV1401'
      SecretsFilter: 'OwaspNVDKey'
            
  - task: AzureKeyVault@2
    displayName: 'Get OWASP NVD OSS Username'
    inputs:
      azureSubscription: 'AZD-RWD-DEV1'
      KeyVaultName: 'DEVRWDINFKV1401'
      SecretsFilter: 'OwaspNVDOssUsername'
      
  - task: AzureKeyVault@2
    displayName: 'Get OWASP NVD OSS Password'
    inputs:
      azureSubscription: 'AZD-RWD-DEV1'
      KeyVaultName: 'DEVRWDINFKV1401'
      SecretsFilter: 'OwaspNVDOssPassword'

  - task: PowerShell@2
    displayName: Create data directory
    inputs:
      targetType: inline
      script: |
        Write-Host "Creating directory: dependency-check-data"
        New-Item -ItemType Directory -Path "dependency-check-data" -Force | Out-Null

  - task: AzureCLI@2
    displayName: Download existing DB
    inputs:
      azureSubscription: AZD-RWD-DEV1
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        Write-Host "Checking if archive exists in storage..."
        $exists = az storage blob exists --account-name "${{parameters.dependencyDataStorageAccount}}" --container-name "${{parameters.dependencyDataContainer}}" --name "dependency-check-data.tar.gz" --auth-mode login --query "exists" -o tsv

        if ($exists -eq "true") {
          Write-Host "Archive exists. Downloading..."
          az storage blob download --account-name "${{parameters.dependencyDataStorageAccount}}" --container-name "${{parameters.dependencyDataContainer}}" --name "dependency-check-data.tar.gz" --file "dependency-check-data.tar.gz" --auth-mode login
          Write-Host "Download complete."
        }
        else {
          Write-Host "Archive does not exist. Starting from empty data directory."
        }

  - task: PowerShell@2
    displayName: Extract existing DB
    inputs:
      targetType: inline
      script: |
        if (Test-Path "dependency-check-data.tar.gz") {
          tar -xzf "dependency-check-data.tar.gz" -C "dependency-check-data"
          Write-Host "Existing archive extracted."
        }
        else {
          Write-Host "Skipping extract because archive does not exist."
        }

        Write-Host "Current data directory contents:"
        Get-ChildItem -Path "dependency-check-data" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20
      
  - bash: |
      if [ -f "$(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}/${{parameters.projectFolder}}/package.json" ]; then
        echo "##vso[task.setvariable variable=NodeProjectExists]true"
      fi
    displayName: 'Check if package.json exists'
      
  - task: Npm@1
    condition: and(succeeded(), eq(variables['NodeProjectExists'], 'true')) 
    inputs:
      command: 'install'
      workingDir: $(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}/${{parameters.projectFolder}}
    displayName: 'Run npm install'

  - script: |
      docker pull owasp/dependency-check-action:latest
    displayName: 'Pull OWASP Image'
    
  - script: |
      docker run --rm \
        -v $(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}:/workspace \
        -v $(System.DefaultWorkingDirectory)/dependency-check-data:/usr/share/dependency-check/data \
        owasp/dependency-check-action:latest \
        --nvdApiKey $(OwaspNVDKey) \
        --project ${{parameters.projectFolder}} \
        --scan /workspace \
        --exclude '**/*Tests.csproj' \
        --format HTML --format JUNIT \
        --ossIndexUsername $(OwaspNVDOssUsername) \
        --ossIndexPassword $(OwaspNVDOssPassword) \
        --out /workspace \
        --noupdate \
        --disableOssIndex
    displayName: 'Run dependency check'
    
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'dependency-check-junit.xml'
      searchFolder: '$(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}'
    displayName: 'Publish Dependency Check Test Results if Available'

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}/dependency-check-report.html'
      artifact: $(System.JobAttempt)-owasp-report
      publishLocation: 'pipeline'
    displayName: 'Publish OWASP Artifact'

  - task: Bash@3
    displayName: 'Run OSV Scanner'
    inputs:
      targetType: 'inline'
      script: |
        docker run --rm \
          -v "$(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}:/src" \
          ghcr.io/google/osv-scanner:v2.3.6 \
          scan source --recursive --format=sarif --output=/src/osv-results.sarif /src || true

  - task: PublishPipelineArtifact@1
    displayName: 'Publish OSV Scan Results'
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/${{parameters.solutionFolder}}/osv-results.sarif'
      artifact: $(System.JobAttempt)-osv-report
      publishLocation: 'pipeline'
