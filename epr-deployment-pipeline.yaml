parameters:
- name: imageTag
  type: string
  default: 'main-latest'
- name: azureSubscription
  type: string
- name: acrName
  type: string
- name: registryName
  type: string
- name: serviceName
  type: string
- name: targetEnvironment
  type: string
- name: runAutomationTests #will let us toggle automation tests on or off
  type: boolean
  default: true
- name: poolOS
  type: string
  default: 'ubuntu'
  values:
      - 'ubuntu'
      - 'windows'
- name: pool
  type: string
  default: ''
- name: envToDeploy
  type: string
  default: ''


jobs:
- deployment: 'DeployAppCode'
  environment: ${{ parameters.targetEnvironment }}
  pool:
    ${{ if or(contains(lower(parameters.envToDeploy), 'pre'), contains(lower(parameters.envToDeploy), 'prod')) }}:
      ${{ if eq(lower(parameters.poolOS), 'windows') }}:
        name: DEFRA-COMMON-WINDOWS-SSV5
      ${{ else }}:
        name: DEFRA-COMMON-UBUNTU-SSV5
    ${{ else }}:
      ${{ if ne(parameters.pool, '') }}:
        name: ${{ parameters.pool }}
      ${{ else }}:
        name: DEFRA-COMMON-UBUNTU-SSV3
  strategy:
    runOnce:
      deploy:
        steps:
          - template: templates/deployment.yaml
            parameters:
              imageTag: ${{ parameters.imageTag }}
              azureSubscription: ${{ parameters.azureSubscription }}
              acrName: ${{ parameters.acrName }}
              registryName: ${{ parameters.registryName }}
              serviceName: ${{ upper(parameters.serviceName) }}
              targetEnvironment: ${{ parameters.targetEnvironment }}



- ${{ if and(eq(parameters.runAutomationTests, true), eq(parameters.targetEnvironment, 'tst')) }}:
  - job: RunAutomationTest
    dependsOn: DeployAppCode
    displayName: 'Run TST Automation Testing'
    steps:
      - checkout: AutomationTesting
      - template: pipelines/automation-testing-template.yml@AutomationTesting
        parameters:
          env: 'tst'
